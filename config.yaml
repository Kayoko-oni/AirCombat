map:
  width: 1000
  height: 1000
  center: [0, 0, 0]
  buildings:
    # 建筑生成相关配置：支持配置生成数量区间、是否避免 XY 平面重叠、缓冲距离等
    count_min: 180
    count_max: 240
    avoid_overlap: true
    padding: 2.5
    max_attempts_per_building: 2000
  # TODO: 添加边界定义和障碍物

radar:
  range: 500
  pulse_interval: 1.0
  delay: 0.5
  # TODO: 添加噪声和精度参数

base:
  health: 100
  position: [75, 75, 0]
  collision_radius: 12.5

simulation:
  fps: 30
  duration: 300
  # 0 表示无限运行时间，直到手动关闭程序
  # TODO: 添加暂停/恢复控制和保存/加载状态

  # 生成新进攻无人机的时间间隔（秒），仿真可通过调大这两个值实现小规模测试
  # 为了默认方便调试，默认间隔设置为较大值，减少场景密度
  spawn_interval_min: 1.0
  spawn_interval_max: 6.0
  # 最大同时存在的进攻方数量（用于限制自动生成）
  max_offensive: 6
  
path_planning:
  # 路径重规划相关参数（可在调试时调整）
  replan_distance: 1.0      # 米，目标发生移动超过该距离触发重规划
  replan_cooldown: 0.5      # 秒，重规划的最小间隔
  max_plan_time_ms: 50     # 毫秒，单次 A* 规划的时间上限
  path_tolerance: 1.0       # 米，认为已到达路径点的容差
  debug_log: false          # 是否记录重规划日志到 stdout

assignment:
  # 改进拍卖 + CMA 动态分配参数（默认调优版，可在此直接调参）
  epsilon_start: 0.8 # 贪婪搜索参数
  epsilon_end: 0.002
  epsilon_decay: 0.25
  max_iterations_per_phase: 12000
  regret_weight: 0.15
  warm_start: true
  warm_start_fraction: 0.4
  enable_local_refine: true
  local_refine_rounds: 6

  communication_range: 320.0 # 通信参数
  max_operational_distance: 1200.0
  response_distance_weight: 0.5
  response_energy_weight: 0.35
  response_health_weight: 0.15
  response_threshold: 0.38

  attention_temperature: 0.6 # 约束条件参数
  distance_weight: 1.0
  urgency_weight: 32.0
  load_balance_weight: 20.0
  feasibility_weight: 18.0
  attention_weight: 24.0
  non_responder_penalty: 60.0
  sticky_assignment_bonus: 12.0
  reassignment_penalty: 7.0

drones:
  attack:
    speed: 7.5
    max_speed: 30.0
    health: 80.0
    attack_power: 25.0
    battery: 80.0
  tank:
    speed: 4.5
    max_speed: 20.0
    health: 150.0
    attack_power: 15.0
    battery: 120.0
  scout:
    speed: 15.0
    max_speed: 40.0
    health: 60.0
    attack_power: 5.0
    battery: 60.0
  interceptor:
    speed: 12.0
    max_speed: 35.0
    health: 90.0
    attack_power: 20.0
    battery: 90.0

